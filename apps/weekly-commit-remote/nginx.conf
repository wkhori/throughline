server {
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;

  # MF remoteEntry must be CORS-permissive so the host can fetch it cross-origin.
  add_header 'Access-Control-Allow-Origin' '*' always;
  add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
  add_header 'Access-Control-Allow-Headers' '*' always;

  # remoteEntry.js cannot be long-cached — content-hashed chunks below are.
  # nginx drops parent add_header directives when a location declares any
  # add_header of its own, so CORS headers are repeated here.
  location = /remoteEntry.js {
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' '*' always;
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|webp)$ {
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' '*' always;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
