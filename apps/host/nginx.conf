server {
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — every unknown path returns index.html so the React Router takes over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # MF bootstrap is not content-hashed; index.html keeps referencing the same
  # filename across deploys, so it must be no-cache.
  location ~ ^/mf-entry-bootstrap-.*\.js$ {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  # Long-cache hashed assets; short-cache the entry HTML so deploys take effect immediately.
  location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
