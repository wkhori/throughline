apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
data:
  application.yaml: |
    spring:
      profiles:
        active: {{ .Values.env.SPRING_PROFILES_ACTIVE }}
    server:
      port: {{ .Values.service.port }}
    management:
      endpoints:
        web:
          exposure:
            include: health,info
      endpoint:
        health:
          show-details: when-authorized
