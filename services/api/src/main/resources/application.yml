spring:
  application:
    name: weekly-commit-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/throughline}
    username: ${DATABASE_USER:throughline}
    password: ${DATABASE_PASSWORD:throughline}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # P34/P38: V4 lands after V5 on long-lived dev DBs (V5 was applied during phase/3-manager).
    # Allow Flyway to accept this gap retroactively. Fresh prod DBs migrate from scratch and are
    # unaffected.
    out-of-order: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # When AUTH0_ISSUER_URI is empty, we activate MockJwtDecoder (dev profile only).
          issuer-uri: ${AUTH0_ISSUER_URI:}

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

throughline:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  auth0:
    audience: ${AUTH0_AUDIENCE:https://api.throughline.app}
    issuer-uri: ${AUTH0_ISSUER_URI:}
  # Symmetric secret used by /api/v1/auth/demo-login to sign demo persona JWTs (HS256).
  # Must be ≥32 chars in production. When unset (local dev), the endpoint returns 503 and the
  # PersonaSwitcher falls back to the legacy literal mock.* tokens accepted by MockJwtDecoder.
  demo:
    jwt-secret: ${THROUGHLINE_DEMO_JWT_SECRET:}
  org:
    timezone: ${ORG_TIMEZONE:America/New_York}

# Anthropic config (PRD §6 / docs/ai-copilot-spec.md). Real client activates only when
# `anthropic.api-key` is non-blank — see AnthropicClientImpl @ConditionalOnProperty.
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
  version: "2023-06-01"
  model:
    haiku: ${ANTHROPIC_MODEL_HAIKU:claude-haiku-4-5-20251001}
    sonnet: ${ANTHROPIC_MODEL_SONNET:claude-sonnet-4-6}
  request:
    connect-timeout-ms: 2000
    read-timeout-ms: 25000
  cache:
    insight-ttl-seconds: 60
  budget:
    org-soft-cap-cents: 25000
    org-hard-cap-cents: 50000

app:
  notifications:
    # `slack` (live) | `outlook` (stub — UnsupportedOperationException) | `log` (test default)
    channel: ${NOTIFICATION_CHANNEL:log}
    slack:
      webhook-url: ${SLACK_WEBHOOK_URL:}
      dashboard-url: ${DIGEST_DASHBOARD_URL:http://localhost:5173/manager}

logging:
  level:
    root: INFO
    com.throughline: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
