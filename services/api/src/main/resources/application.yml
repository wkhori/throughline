spring:
  application:
    name: weekly-commit-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/throughline}
    username: ${DATABASE_USER:throughline}
    password: ${DATABASE_PASSWORD:throughline}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # When AUTH0_ISSUER_URI is empty, we activate MockJwtDecoder (dev profile only).
          issuer-uri: ${AUTH0_ISSUER_URI:}

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

throughline:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  auth0:
    audience: ${AUTH0_AUDIENCE:https://api.throughline.app}
    issuer-uri: ${AUTH0_ISSUER_URI:}
  org:
    timezone: ${ORG_TIMEZONE:America/New_York}

logging:
  level:
    root: INFO
    com.throughline: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
