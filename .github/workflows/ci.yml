name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn nx run-many -t lint
      - run: yarn nx run-many -t type-check
      - run: yarn nx run-many -t test --coverage
      - run: yarn nx run-many -t build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_DB: throughline
          POSTGRES_USER: throughline
          POSTGRES_PASSWORD: throughline
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U throughline"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('services/api/**/*.gradle*', 'services/api/gradle/wrapper/gradle-wrapper.properties') }}
      - name: Build & test (jacoco ≥80%)
        working-directory: services/api
        run: ./gradlew clean check
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/throughline
          DATABASE_USER: throughline
          DATABASE_PASSWORD: throughline
