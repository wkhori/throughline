# Local dev infra. `docker compose up -d` brings up Postgres for the API.
# Tests use Testcontainers, not this compose file.
services:
  postgres:
    image: postgres:16.4-alpine
    container_name: throughline-postgres
    environment:
      POSTGRES_DB: throughline
      POSTGRES_USER: throughline
      POSTGRES_PASSWORD: throughline
    ports:
      - '5432:5432'
    volumes:
      - throughline-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U throughline -d throughline']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  throughline-pgdata:
